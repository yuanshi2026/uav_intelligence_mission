# SPEED_PROFILE: 03_aggressive
# 微型无人机完整任务航点文件（坐标系1）
# 坐标系1说明：
# 1. 起飞点为原点 (0, 0)，单位 m；
# 2. +x 与原比赛图 x 方向相同；
# 3. +y 与原比赛图 y 方向相反；
# 4. control_mode = position：普通航段，但 FSM 内部会转成位置 + 速度融合控制，按距离提前减速；
# 5. control_mode = fusion：精细停靠点，位置 + 速度融合控制，会停稳后执行 action；
# 6. control_mode = fusion_route：复杂通过点，位置 + 速度融合控制，速度受限但默认不强制刹停；
# 7. 正式比赛前请按现场实测微调所有 x/y/z，尤其是圆环 x 和降落点映射。

mission:
  frame: relative_home

  # 起飞参数
  takeoff:
    z: 1.35
    yaw_deg: 0.0
    # 起飞判稳单独配置：不沿用 scan/drop 的 8cm 严格判据。
    stable_time: 0.40
    pos_eps: 0.15
    stable_vel: 0.18
    stable_acc: 0.80
    max_wait: 5.0
    min_height: 1.20

  # 真实视觉版：二维码、图片靶、圆环都由视觉节点给结果。
  # QR 超时不会中止任务；若未识别到二维码，后续按默认航线继续完成任务。
  wait_real_qr: true
  wait_real_image: true
  wait_real_ring: true

  # 二维码识别失败/仿真占位时使用的默认结果。
  # class_1/class_2 必须和视觉节点输出的 class_name 完全一致。
  # 这里先沿用对接文档示例 man,apple；实飞前请改成你们默认想投的两个类别。
  qr_default:
    enabled: true
    class_1: man
    class_2: apple
    landing_side: right

  # 圆形绕障配置：障碍物中心来自比赛地图。
  # 地图中：起飞点 (1500,3000) mm，障碍物中心 (5800,3000) mm。
  # 当前代码坐标系以起飞点为 (0,0)，单位 m，且 y 与地图 y 方向相反，
  # 因此障碍物中心为 x=(5800-1500)/1000=4.30，y=(3000-3000)/1000=0.00。
  # 这里采用位置 + 速度前馈 + 加速度前馈连续发布的圆形轨迹。
  obstacle:
    mode: circle_feedforward
    loop_count: 5
    max_loop_count: 8
    center_x: 4.30
    center_y: 0.00
    radius: 1.35
    height: 1.35
    circle_speed: 1.20
    # 1m/s 绕 1m 半径圆时，向心加速度前馈为 1.00m/s^2。
    # ramp_time 控制切向加减速，1.50s 比原 2.00s 略激进，但仍避免突然满速。
    ramp_time: 1.50
    direction: clockwise
    # 从圆左侧直接入圆/出圆：start_angle=180deg，对应半径 1.00m 的圆起点 (3.30, 0.00)。
    start_angle_deg: 180.0
    yaw_mode: fixed
    finish_pos_eps: 0.18
    finish_vel_th: 0.25
    finish_stable_time: 0.20
    # 圆轨迹结束后，不再允许单纯等超时就切下一个点；
    # 只有达到严格判稳，或者超时后仍满足软判稳，才允许退出绕圆。
    finish_max_wait: 1.50
    finish_soft_pos_eps: 0.30
    finish_soft_vel_th: 0.35

  # 降落点映射
  # 当前按之前讨论：left -> 下方 H 点 (0, 1.6)，right -> 上方 H 点 (0, -1.6)。
  # 若现场二维码 left/right 的判定相反，只需要交换下面 left/right 的 y。
  landing:
    # 真实视觉版不强制 left/right；二维码失败时回退 default_side。
    force_side: ""
    default_side: right
    # 到达 LAND_FINAL_DYNAMIC 后自动切 AUTO.LAND，不再只悬停等待 /uav/land。
    auto_land_after_mission: true
    approach_x: 1.00
    # LAND_PRE_DYNAMIC 预降速点 x 坐标：从圆环后方横移回来后，先到最终 H 点前方 1m 处收速，再低速进入 H 点。
    pre_x: 1.00
    # 切 AUTO.LAND 前先用 OFFBOARD 锁当前位置和固定 yaw，降低切模式瞬间机身扭转。
    # 普通 land 准备时间稍长；stop 急停准备时间很短，只用于让 yaw setpoint 平滑交接。
    prepare_time: 0.80
    emergency_prepare_time: 0.20
    disarm_prepare_time: 0.80
    prepare_vel_th: 0.20
    prepare_max_wait: 1.50
    emergency_prepare_max_wait: 0.35
    disarm_prepare_max_wait: 1.50
    left:
      x: 0.00
      y: 1.60
    right:
      x: 0.00
      y: -1.60

  # 通用控制参数
  control:
    rate_hz: 50.0

    yaw_eps_deg: 5.0
    # 只有快速通过点跳过 YAW_ALIGN 时使用这个更严格的阈值。
    # 普通 YAW_ALIGN 仍按 yaw_eps_deg 判断，跳过原地对齐必须小于 3°。
    skip_yaw_align_eps_deg: 3.0
    yaw_break_eps_deg: 12.0

    # 普通 route 点也会走位置 + 速度融合控制。
    # route_pos_eps 是进入目标点范围的判据；到点后先刹停，再切下一个 position 航点。
    route_pos_eps: 0.20
    route_finish_vel: 0.28
    route_finish_acc: 0.45

    # 判稳防卡死：普通路线点默认不用加速度硬卡，只要求到点 + 低速。
    acc_lpf_alpha: 0.25
    yaw_align_use_acc_gate: false
    yaw_align_soft_wait: 0.80
    yaw_align_soft_vel: 0.35
    brake_timeout: 1.20
    brake_soft_vel: 0.35
    action_use_acc_gate: false

    # 距离减速参数：小于 slow_radius 后，速度按距离线性下降。
    # 这些参数是第一版保守值，先解决冲太快和刹不住，再逐步加速。
    route_slow_radius: 0.65
    obs_slow_radius: 0.32
    # 绕障菱形中间点为 fusion_route，不刹停；这里把减速区收小，减少顶点处顿挫。
    obs_fast_slow_radius: 0.18
    scan_slow_radius: 0.45
    ring_slow_radius: 0.60
    land_slow_radius: 0.85
    route_min_speed: 0.18
    scan_min_speed: 0.10
    ring_min_speed: 0.12

    # scan/drop/ring 精细点用融合控制，要求更稳。
    # scan_kp 保留为备用参数；当前速度主要由 speed、acc、slow_radius 控制。
    scan_pos_eps: 0.10
    scan_kp: 0.65
    scan_stable_vel: 0.15
    scan_stable_acc: 0.80
    scan_stable_time: 0.40

  # 动作耗时参数
  action:
    qr_scan_timeout: 3.00
    # 识别到图片类别但不是目标类别时，最少确认这么久后跳过该靶。
    image_scan_time: 0.45

    # 图片靶真实视觉三阶段：
    # 1) 先在 1.35m 高空只识别类别；
    # 2) 类别匹配二维码后，再单独高空瞄准并锁定 XY；
    # 3) 关闭视觉下降到 image_drop_z，到位稳定后直接投放。
    # image_class_timeout 是高空等待类别的最大时间；保留 image_class_scan_time 作为旧参数兼容别名。
    image_class_timeout: 1.50
    image_class_scan_time: 1.50
    image_class_min_confidence: 0.55
    image_class_min_stable_count: 3
    # 图片靶投放高度：高空识别 + 高空瞄准锁定 XY 后，再降到这里直接投放。
    # 0.65m 比原 0.70m 更利于落点，但实飞前建议先从 0.70 -> 0.65 分两次试。
    image_drop_z: 0.13
    image_descend_timeout: 2.50
    image_descend_pos_eps: 0.08
    # 新增：图片靶低空满足投放条件后，连续稳定等待这么久再真正投放。
    # 只影响图片靶 DESCEND 阶段，不影响特殊靶和投放后等待。
    image_pre_drop_stable_time: 0.30

    # 新增：类别确认后的“高空单独瞄准”阶段。
    # 注意：现在不是边识别边瞄准，而是先识别，再进入 HIGH_AIM 高空瞄准。
    # image_high_aim_timeout 是确认类别后，最多给高空瞄准等待的时间。
    image_scan_aim_enabled: true
    image_scan_aim_xy_eps: 0.08
    image_scan_aim_min_confidence: 0.55
    image_scan_aim_max_wait: 1.50
    image_high_aim_timeout: 1.50
    image_scan_aim_required_for_drop: true
    image_scan_aim_max_shift: 0.30
    image_lock_xy_on_descend: true

    # 低空阶段不再主动瞄准；下面几个 low_* 参数只作为下降超时兜底判据保留。
    # 下降阶段 FSM 会关闭 /uav/scan_enable，因此拍照节点不会继续采集下降过程图像。
    image_low_align_max_shift: 0.16
    image_low_no_vision_force_drop: true
    image_low_no_vision_force_wait: 0.70
    image_low_force_pos_eps: 0.18
    image_low_force_vel: 0.15
    # 当前顺序逻辑不再进入低空对准阶段；该参数保留给旧的低空 ALIGN_DROP 逻辑兼容。
    image_align_timeout_policy: force_drop
    # 兜底：如果剩余图片靶扫描点数量 == 剩余图片靶投放物块数量，
    # 当前图片靶在高空分类超时或类别不匹配时，仍进入 HIGH_AIM 高空瞄准，然后下降投放。
    image_force_drop_remaining_equal: true

    drop_time: 1.0
    hold_after_action: 0.5
    # ACTION 软判稳：防止识别/投放动作被轻微抖动无限卡住。
    action_soft_timeout: 1.50
    action_soft_pos_eps: 0.18
    action_soft_vel: 0.20

    # 图片靶 / 特殊靶视觉闭环对准参数
    # 视觉节点负责像素 -> 米制偏差；FSM 只使用 offset_x_m / offset_y_m 做小范围移动。
    vision_result_timeout: 0.50
    image_align_timeout: 2.50
    special_align_timeout: 2.50
    align_xy_eps: 0.08
    align_step_max: 0.15
    align_gain: 0.80
    align_min_confidence: 0.55
    align_min_stable_count: 1

    # 特殊靶专用瞄准/兜底投放参数。
    # 特殊靶不需要类别识别，只需要识别靶心偏差用于瞄准；若瞄准超时，则在已到达低空投放点且速度较低时强制投放一次。
    special_align_xy_eps: 0.08
    special_min_confidence: 0.60
    special_min_stable_count: 2
    special_force_drop_enabled: true
    special_force_drop_timeout: 2.50
    special_force_drop_allow_no_vision: true
    special_force_drop_pos_eps: 0.22
    special_force_drop_vel: 0.25

    # 圆环真实视觉参数。
    # 搜索成功时用视觉动态生成 RING_PRE / RING_CENTER / RING_POST；
    # 搜索失败时按 ring_timeout_policy 决定是否走 YAML 固定兜底点。
    ring_search_timeout: 3.0
    ring_search_min_time: 0.3      # 远距离搜索至少多看 1 秒，再锁定动态穿环点
    ring_search_min_stable_count: 4  # 远距离搜索要求更多稳定帧，避免单帧误锁
    ring_timeout_policy: fixed  # fixed：圆环视觉超时后继续走 YAML 固定穿环点，保证任务不断线
    ring_pre_distance: 1.00
    ring_post_distance: 0.60
    # 前视相机安装/识别中心与机体中心不一致时，用下面两个量微调穿环轨迹。
    # ring_align_bias_x：MAVROS local X 方向偏置，单位 m；正值让动态 CENTER/PRE/POST 整体向 +X 偏。
    # ring_align_bias_z：高度 Z 方向偏置，单位 m；正值让动态 CENTER/PRE/POST 整体升高。
    # 建议每次只调 0.03~0.05 m，先保持 0.00，实飞看偏差再改。
    ring_align_bias_x: 0.00
    ring_align_bias_z: -0.05
    ring_align_timeout: 2.5
    ring_yz_eps: 0.07
    ring_align_step_max: 0.12
    ring_align_gain: 0.75
    ring_min_confidence: 0.70
    ring_min_stable_count: 3
    ring_forward_min: 0.30
    ring_forward_max: 3.50
    ring_min_z: 1.35
    ring_max_z: 1.85


    # 固定图片靶动作的旧参数保留备用。
    # 当前真实视觉版主要使用 image_scan_maybe_drop，不再走手控等待动作。
    fixed_image_align_min_wait: 0.15
    fixed_image_align_timeout: 0.75
    fixed_image_force_drop_timeout: 1.15
    fixed_image_fallback_vel: 0.22
    fixed_image_align_max_shift: 0.22
    fixed_image_align_min_confidence: 0.45
    fixed_image_align_min_stable_count: 1
    manual_image_hover_time: 3.0
    manual_image_no_auto_drop: true

  # 固定任务点
    ring_exit_x_distance: 2.0
  waypoints:
    # 01 二维码扫描点：坐标系1中二维码为 (1.8, 0)
  - name: QR_SCAN
    kind: scan
    control_mode: fusion
    action: qr_scan
    x: 1.80
    y: 0.00
    z: 1.35
    yaw_deg: 0.0
    speed: 0.80
    acc: 0.48
    hold_time: 0.50

    # 02 顺时针圆形绕障：半径 1.00m，高度 1.35m，速度 1.00m/s。
    # 障碍物中心为 (4.30, 0.00)，来自比赛地图 (5800,3000) mm 相对起飞点 (1500,3000) mm 的换算。
    # 现在删除切向入圆过渡，直接从圆左侧点 (3.30, 0.00) 入圆；
    # OBS_CIRCLE_START 到达圆起点后执行 circle_obstacle 动作，FSM 内部连续发布位置 + 速度 + 加速度前馈；
    # OBS_EXIT 也设置在 (3.30, 0.00)，绕完回到圆左侧后再接后续图片靶航点。
  - name: OBS_ENTRY
    kind: route
    control_mode: position
    action: none
    x: 2.95
    y: 0.00
    z: 1.35
    yaw_deg: 0.0
    speed: 0.80
    acc: 0.85

  - name: OBS_CIRCLE_START
    kind: scan
    control_mode: fusion
    action: circle_obstacle
    x: 2.95
    y: 0.00
    z: 1.35
    yaw_deg: 0.0
    speed: 0.50
    acc: 0.65
    hold_time: 0.15

  - name: OBS_EXIT
    kind: route
    control_mode: position
    action: none
    x: 2.95
    y: 0.00
    z: 1.35
    yaw_deg: 0.0
    speed: 0.80
    acc: 0.85

    # 03 图片靶真实视觉逻辑：
    # 每个候选图片靶先走 *_OVER 保持原航线，再在同坐标 *_SCAN 做高空分类。
    # 若类别不是二维码要求，SCAN 动作会在高空短扫后跳过，不下降、不投放；
    # 若类别匹配二维码，FSM 会先高空瞄准锁定 XY，再下降到 image_drop_z 自动发布 image_drop_1 / image_drop_2。
    # 两个二维码目标都投完后，后续 *_SCAN 会在进入导航前直接跳过，*_OVER 仍保持原路线。
  - name: IMG2_OVER
    kind: route
    control_mode: fusion_route
    action: none
    x: 3.64
    y: -1.58
    z: 1.35
    yaw_deg: 0.0
    speed: 0.90
    acc: 0.95

  - name: IMG2_SCAN
    kind: scan
    control_mode: fusion
    action: image_scan_maybe_drop
    x: 3.64
    y: -1.58
    z: 1.35
    yaw_deg: 0.0
    speed: 0.30
    acc: 0.35
    hold_time: 0.40

  - name: IMG2_UP
    kind: route
    control_mode: fusion_route
    action: none
    x: 3.64
    y: -1.58
    z: 1.35
    yaw_deg: 0.0
    speed: 0.85
    acc: 0.80

  - name: IMG1_OVER
    kind: route
    control_mode: fusion_route
    action: none
    x: 1.83
    y: -1.59
    z: 1.35
    yaw_deg: 0.0
    speed: 0.90
    acc: 0.85

  - name: IMG1_SCAN
    kind: scan
    control_mode: fusion
    action: image_scan_maybe_drop
    x: 1.83
    y: -1.59
    z: 1.35
    yaw_deg: 0.0
    speed: 0.30
    acc: 0.35
    hold_time: 0.40

  - name: IMG1_UP
    kind: route
    control_mode: fusion_route
    action: none
    x: 1.83
    y: -1.59
    z: 1.35
    yaw_deg: 0.0
    speed: 0.85
    acc: 0.80

  - name: IMG3_OVER
    kind: route
    control_mode: fusion_route
    action: none
    x: 1.84
    y: 1.58
    z: 1.35
    yaw_deg: 0.0
    speed: 1.00
    acc: 0.90

  - name: IMG3_SCAN
    kind: scan
    control_mode: fusion
    action: image_scan_maybe_drop
    x: 1.84
    y: 1.58
    z: 1.35
    yaw_deg: 0.0
    speed: 0.30
    acc: 0.35
    hold_time: 0.40

  - name: IMG3_UP
    kind: route
    control_mode: fusion_route
    action: none
    x: 1.84
    y: 1.58
    z: 1.35
    yaw_deg: 0.0
    speed: 0.85
    acc: 0.80

  - name: IMG4_OVER
    kind: route
    control_mode: fusion_route
    action: none
    x: 3.67
    y: 1.52
    z: 1.35
    yaw_deg: 0.0
    speed: 1.00
    acc: 0.85

  - name: IMG4_SCAN
    kind: scan
    control_mode: fusion
    action: image_scan_maybe_drop
    x: 3.67
    y: 1.52
    z: 1.35
    yaw_deg: 0.0
    speed: 0.30
    acc: 0.35
    hold_time: 0.40
  - name: IMG4_UP
    kind: route
    control_mode: fusion_route
    action: none
    x: 3.67
    y: 1.52
    z: 1.35
    yaw_deg: 0.0
    speed: 0.85
    acc: 0.80

    # 04 特殊靶：中心 (6.0, 1.0)
  - name: SPECIAL_OVER
    kind: scan
    control_mode: fusion
    action: none
    x: 6.08
    y: 1.08
    z: 1.35
    yaw_deg: 0.0
    speed: 0.58
    acc: 0.55
    hold_time: 0.25

  - name: SPECIAL_DROP
    kind: scan
    control_mode: fusion
    action: special_drop
    x: 6.08
    y: 0.88
    z: 0.13
    yaw_deg: 0.0
    speed: 0.30
    acc: 0.34
    hold_time: 0.35

  - name: SPECIAL_UP
    kind: scan
    control_mode: fusion
    action: none
    x: 6.08
    y: 0.88
    z: 1.35
    yaw_deg: 0.0
    speed: 0.50
    acc: 0.48
    hold_time: 0.10

    # 05 圆环：真实视觉版。
    # 前置相机朝机体 +x，先在 TURN_TO_RING 转到 -90 deg，使相机/机头朝世界 -y。
    # RING_SEARCH_START 识别圆环并动态生成 PRE/CENTER/POST；若识别超时则按 YAML 固定点兜底继续。
  - name: TURN_TO_RING
    kind: scan
    control_mode: fusion
    action: none
    x: 6.00
    y: 1.00
    z: 1.40
    yaw_deg: -90.0
    speed: 0.45
    acc: 0.42
    hold_time: 0.20

  - name: RING_SEARCH_START
    kind: scan
    control_mode: fusion
    action: ring_search
    x: 6.00
    y: -0.25
    z: 1.40
    yaw_deg: -90.0
    speed: 0.58
    acc: 0.52
    hold_time: 0.50

  - name: RING_PRE
    kind: scan
    control_mode: fusion
    action: ring_pre_align
    x: 6.00
    y: -0.60
    z: 1.40
    yaw_deg: -90.0
    speed: 0.52
    acc: 0.48
    hold_time: 0.15

  - name: RING_CENTER
    kind: route
    control_mode: fusion_route
    action: none
    x: 6.00
    y: -1.60
    z: 1.40
    yaw_deg: -90.0
    speed: 0.90
    acc: 0.80

  - name: RING_POST
    kind: route
    control_mode: position
    action: none
    x: 6.00
    y: -2.20
    z: 1.40
    yaw_deg: -90.0
