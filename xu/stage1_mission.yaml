# SPEED_PROFILE: 03_aggressive
# 微型无人机完整任务航点文件（坐标系1）
# 坐标系1说明：
# 1. 起飞点为原点 (0, 0)，单位 m；
# 2. +x 与原比赛图 x 方向相同；
# 3. +y 与原比赛图 y 方向相反；
# 4. control_mode = position：普通航段，但 FSM 内部会转成位置 + 速度融合控制，按距离提前减速；
# 5. control_mode = fusion：精细停靠点，位置 + 速度融合控制，会停稳后执行 action；
# 6. control_mode = fusion_route：复杂通过点，位置 + 速度融合控制，速度受限但默认不强制刹停；
# 7. 正式比赛前请按现场实测微调所有 x/y/z，尤其是圆环 x 和降落点映射。

mission:
  frame: relative_home

  # 起飞参数
  takeoff:
    z: 1.35
    yaw_deg: 0.0
    # 起飞判稳单独配置：不沿用 scan/drop 的 8cm 严格判据。
    stable_time: 0.40
    pos_eps: 0.15
    stable_vel: 0.18
    stable_acc: 0.80
    max_wait: 5.0
    min_height: 1.20

  # 已知二维码结果、图片靶位置、圆环位置时，仿真/提速版不等待真实视觉节点。
  # 若要恢复真实视觉闭环，再把对应项改回 true。
  wait_real_qr: false
  wait_real_image: false
  wait_real_ring: false

  # 绕障圈数配置：只改 loop_count 即可控制绕几圈。
  # 实飞第一次建议 1；确认稳定后可改 2。
  obstacle:
    loop_count: 2
    max_loop_count: 8

  # 降落点映射
  # 当前按之前讨论：left -> 下方 H 点 (0, 1.6)，right -> 上方 H 点 (0, -1.6)。
  # 若现场二维码 left/right 的判定相反，只需要交换下面 left/right 的 y。
  landing:
    # 已知二维码降落结果为 right，强制使用右降落点，避免没有视觉节点时回落到 left。
    force_side: right
    default_side: right
    # 到达 LAND_FINAL_DYNAMIC 后自动切 AUTO.LAND，不再只悬停等待 /uav/land。
    auto_land_after_mission: true
    approach_x: 1.00
    # 切 AUTO.LAND 前先用 OFFBOARD 锁当前位置和固定 yaw，降低切模式瞬间机身扭转。
    # 普通 land 准备时间稍长；stop 急停准备时间很短，只用于让 yaw setpoint 平滑交接。
    prepare_time: 0.80
    emergency_prepare_time: 0.20
    disarm_prepare_time: 0.80
    prepare_vel_th: 0.20
    prepare_max_wait: 1.50
    emergency_prepare_max_wait: 0.35
    disarm_prepare_max_wait: 1.50
    left:
      x: 0.00
      y: 1.60
    right:
      x: 0.00
      y: -1.60

  # 通用控制参数
  control:
    rate_hz: 30.0

    yaw_eps_deg: 5.0
    yaw_break_eps_deg: 12.0

    # 普通 route 点也会走位置 + 速度融合控制。
    # route_pos_eps 是进入目标点范围的判据；到点后先刹停，再切下一个 position 航点。
    route_pos_eps: 0.20
    route_finish_vel: 0.28
    route_finish_acc: 0.45

    # 判稳防卡死：普通路线点默认不用加速度硬卡，只要求到点 + 低速。
    acc_lpf_alpha: 0.25
    yaw_align_use_acc_gate: false
    yaw_align_soft_wait: 0.80
    yaw_align_soft_vel: 0.35
    brake_timeout: 1.20
    brake_soft_vel: 0.35
    action_use_acc_gate: false

    # 距离减速参数：小于 slow_radius 后，速度按距离线性下降。
    # 这些参数是第一版保守值，先解决冲太快和刹不住，再逐步加速。
    route_slow_radius: 0.65
    obs_slow_radius: 0.32
    # 绕障菱形中间点为 fusion_route，不刹停；这里把减速区收小，减少顶点处顿挫。
    obs_fast_slow_radius: 0.18
    scan_slow_radius: 0.45
    ring_slow_radius: 0.60
    land_slow_radius: 0.85
    route_min_speed: 0.18
    scan_min_speed: 0.10
    ring_min_speed: 0.12

    # scan/drop/ring 精细点用融合控制，要求更稳。
    # scan_kp 保留为备用参数；当前速度主要由 speed、acc、slow_radius 控制。
    scan_pos_eps: 0.10
    scan_kp: 0.65
    scan_stable_vel: 0.15
    scan_stable_acc: 0.80
    scan_stable_time: 0.40

  # 动作耗时参数
  action:
    qr_scan_timeout: 0.60
    image_scan_time: 0.45
    drop_time: 1.0
    hold_after_action: 0.25
    # ACTION 软判稳：防止识别/投放动作被轻微抖动无限卡住。
    action_soft_timeout: 1.50
    action_soft_pos_eps: 0.18
    action_soft_vel: 0.20

    # 图片靶 / 特殊靶视觉闭环对准参数
    # 视觉节点负责像素 -> 米制偏差；FSM 只使用 offset_x_m / offset_y_m 做小范围移动。
    vision_result_timeout: 0.50
    image_align_timeout: 4.0
    special_align_timeout: 4.0
    align_xy_eps: 0.05
    align_step_max: 0.15
    align_gain: 0.80
    align_min_confidence: 0.75
    align_min_stable_count: 3

    # 圆环视觉搜索 / 穿越参数
    # 视觉节点负责输出当前机体系下的 forward_m、offset_y_m、offset_z_m。
    # FSM 在 RING_SEARCH_START 锁定圆环中心，动态生成 RING_PRE / RING_CENTER / RING_POST；
    # 在 RING_PRE 再做一次左右/高度对准，然后连续穿过圆环。
    ring_search_timeout: 5.0
    ring_timeout_policy: hold   # hold：视觉失败原地等；fixed：失败后用 YAML 固定点继续；skip：失败后直接继续下个点
    ring_pre_distance: 0.65
    ring_post_distance: 0.80
    ring_align_timeout: 4.0
    ring_yz_eps: 0.07
    ring_align_step_max: 0.12
    ring_align_gain: 0.75
    ring_min_confidence: 0.70
    ring_min_stable_count: 3
    ring_forward_min: 0.30
    ring_forward_max: 3.50
    ring_min_z: 1.35
    ring_max_z: 1.85


    # 已知两个图片靶：固定点 + 短时间视觉微调 + 手控投放等待。
    # 视觉来得及就小范围修正；视觉来不及就按固定点进入 3 秒手控等待，避免卡死。
    fixed_image_align_min_wait: 0.15
    fixed_image_align_timeout: 0.75
    fixed_image_force_drop_timeout: 1.15
    fixed_image_fallback_vel: 0.22
    fixed_image_align_max_shift: 0.22
    fixed_image_align_min_confidence: 0.45
    fixed_image_align_min_stable_count: 1
    manual_image_hover_time: 3.0
    manual_image_no_auto_drop: true

  # 固定任务点
  waypoints:
    # 01 二维码扫描点：坐标系1中二维码为 (1.8, 0)
    - name: QR_SCAN
      kind: scan
      control_mode: fusion
      action: qr_scan
      x: 1.80
      y: 0.00
      z: 1.35
      yaw_deg: 0.0
      speed: 0.46
      acc: 0.48
      hold_time: 0.50

   # 02 顺时针绕障：改回四点菱形绕障，减少密集小航点导致的频繁降速。
    # OBS_ENTRY / OBS_EXIT 保留 position，用于进入和退出绕障区；
    # OBS_DOWN / OBS_LEFT / OBS_UP 使用 fusion_route，连续通过，不在每个菱形顶点 BRAKE。
    - name: OBS_ENTRY
      kind: route
      control_mode: position
      action: none
      x: 3.40
      y: 0.90
      z: 1.35
      yaw_deg: 0.0
      speed: 0.85
      acc: 0.75

    # 下面四个点是一圈绕障模板。FSM 会按 mission.obstacle.loop_count 自动复制。
    # OBS_LOOP_P4 用于回到每圈起点侧，避免多圈时从 P3 斜切到 P1。
    - name: OBS_LOOP_P1
      obstacle_loop: true
      kind: route
      control_mode: fusion_route
      action: none
      x: 5.20
      y: 0.90
      z: 1.35
      yaw_deg: 0.0
      speed: 0.90
      acc: 0.80

    - name: OBS_LOOP_P2
      obstacle_loop: true
      kind: route
      control_mode: fusion_route
      action: none
      x: 5.20
      y: -0.90
      z: 1.35
      yaw_deg: 0.0
      speed: 0.90
      acc: 0.80

    - name: OBS_LOOP_P3
      obstacle_loop: true
      kind: route
      control_mode: fusion_route
      action: none
      x: 3.40
      y: -0.90
      z: 1.35
      yaw_deg: 0.0
      speed: 0.90
      acc: 0.80

    - name: OBS_LOOP_P4
      obstacle_loop: true
      kind: route
      control_mode: fusion_route
      action: none
      x: 3.40
      y: 0.90
      z: 1.35
      yaw_deg: 0.0
      speed: 0.90
      acc: 0.80

    - name: OBS_EXIT
      kind: route
      control_mode: position
      action: none
      x: 3.40
      y: 0.10
      z: 1.35
      yaw_deg: 0.0
      speed: 0.85
      acc: 0.75

    # 03 图片靶顺序：已知上排两个目标需要投放，剩下两个只按原航线快速通过。
    # 场地图 -> YAML 坐标：
    # (5100,4600) -> (3.60,-1.60)，固定执行 image_drop_1；
    # (3300,4600) -> (1.80,-1.60)，固定执行 image_drop_2；
    # (3300,1400)/(5100,1400) -> y=1.60，只经过中心点，不下降、不扫描、不投放。
    - name: IMG2_OVER
      kind: scan
      control_mode: fusion
      action: none
      x: 3.60
      y: -1.60
      z: 1.35
      yaw_deg: 0.0
      speed: 0.72
      acc: 0.65
      hold_time: 0.08

    - name: IMG2_DROP_FIXED
      kind: scan
      control_mode: fusion
      action: image_drop_1_align_manual_wait
      x: 3.60
      y: -1.60
      z: 0.75
      yaw_deg: 0.0
      speed: 0.42
      acc: 0.38
      hold_time: 0.18

    - name: IMG2_UP
      kind: scan
      control_mode: fusion
      action: none
      x: 3.60
      y: -1.60
      z: 1.35
      yaw_deg: 0.0
      speed: 0.58
      acc: 0.52
      hold_time: 0.05

    - name: IMG1_OVER
      kind: scan
      control_mode: fusion
      action: none
      x: 1.80
      y: -1.60
      z: 1.35
      yaw_deg: 0.0
      speed: 0.72
      acc: 0.65
      hold_time: 0.08

    - name: IMG1_DROP_FIXED
      kind: scan
      control_mode: fusion
      action: image_drop_2_align_manual_wait
      x: 1.80
      y: -1.60
      z: 0.75
      yaw_deg: 0.0
      speed: 0.42
      acc: 0.38
      hold_time: 0.18

    - name: IMG1_UP
      kind: scan
      control_mode: fusion
      action: none
      x: 1.80
      y: -1.60
      z: 1.35
      yaw_deg: 0.0
      speed: 0.58
      acc: 0.52
      hold_time: 0.05

    - name: IMG3_FAST_PASS
      kind: route
      control_mode: fusion_route
      action: none
      x: 1.80
      y: 1.60
      z: 1.35
      yaw_deg: 0.0
      speed: 1.00
      acc: 0.85

    - name: IMG4_FAST_PASS
      kind: route
      control_mode: fusion_route
      action: none
      x: 3.60
      y: 1.60
      z: 1.35
      yaw_deg: 0.0
      speed: 1.00
      acc: 0.85
    # 04 特殊靶：中心 (6.0, 1.0)
    - name: SPECIAL_OVER
      kind: scan
      control_mode: fusion
      action: none
      x: 6.00
      y: 1.00
      z: 1.35
      yaw_deg: 0.0
      speed: 0.58
      acc: 0.55
      hold_time: 0.25

    - name: SPECIAL_DROP
      kind: scan
      control_mode: fusion
      action: special_drop
      x: 6.00
      y: 1.00
      z: 0.75
      yaw_deg: 0.0
      speed: 0.36
      acc: 0.34
      hold_time: 0.35

    - name: SPECIAL_UP
      kind: scan
      control_mode: fusion
      action: none
      x: 6.00
      y: 1.00
      z: 1.35
      yaw_deg: 0.0
      speed: 0.50
      acc: 0.48
      hold_time: 0.10

    # 05 圆环：已知圆环中心为场地图 (7500,4600)，即 YAML 坐标 (6.00,-1.60)。
    # 前置相机朝机体 +x，穿环前先把 yaw 转到 -90 deg，使相机/机头朝世界 -y。
    # 之后沿 y 方向穿环：PRE -> CENTER -> POST，避免 yaw=-90 但横着沿 x 穿。
    - name: TURN_TO_RING
      kind: scan
      control_mode: fusion
      action: none
      x: 6.00
      y: 1.00
      z: 1.60
      yaw_deg: -90.0
      speed: 0.45
      acc: 0.42
      hold_time: 0.20

    - name: RING_SEARCH_START
      kind: scan
      control_mode: fusion
      action: ring_search
      x: 6.00
      y: -0.75
      z: 1.40
      yaw_deg: -90.0
      speed: 0.70
      acc: 0.60
      hold_time: 0.15

    - name: RING_PRE
      kind: scan
      control_mode: fusion
      action: ring_pre_align
      x: 6.00
      y: -1.00
      z: 1.40
      yaw_deg: -90.0
      speed: 0.65
      acc: 0.55
      hold_time: 0.10

    - name: RING_CENTER
      kind: route
      control_mode: fusion_route
      action: none
      x: 6.00
      y: -1.60
      z: 1.40
      yaw_deg: -90.0
      speed: 0.85
      acc: 0.75

    - name: RING_POST
      kind: route
      control_mode: fusion_route
      action: none
      x: 6.00
      y: -2.10
      z: 1.40
      yaw_deg: -90.0
      speed: 0.95
      acc: 0.80
    # 06 回降落区：先走上侧安全通道，再在 x=1.0 处切到目标降落点 y，避免斜穿障碍物附近。
    - name: LAND_TOP_CORRIDOR
      kind: route
      control_mode: position
      action: none
      x: 6.00
      y: -2.00
      z: 1.35
      yaw_deg: -90.0
      speed: 0.80
      acc: 0.70

    - name: LAND_RIGHT_CORRIDOR
      kind: route
      control_mode: position
      action: none
      x: 1.00
      y: -2.00
      z: 1.35
      yaw_deg: -90.0
      speed: 0.95
      acc: 0.80

    - name: LAND_APPROACH_DYNAMIC
      kind: route
      control_mode: position
      action: none
      dynamic_land: true
      x: 1.00
      y: 0.00
      z: 1.35
      yaw_deg: -90.0
      speed: 0.75
      acc: 0.70

    - name: LAND_FINAL_DYNAMIC
      kind: scan
      control_mode: fusion
      action: mission_done
      dynamic_land: true
      x: 0.00
      y: 0.00
      z: 1.35
      yaw_deg: -90.0
      speed: 0.38
      acc: 0.35
      hold_time: 1.00
