# 微型无人机完整任务航点文件（坐标系1）
# 坐标系1说明：
# 1. 起飞点为原点 (0, 0)，单位 m；
# 2. +x 与原比赛图 x 方向相同；
# 3. +y 与原比赛图 y 方向相反；
# 4. control_mode = position：普通航段，纯位置控制，速度主要由 PX4 位置控制参数决定；
# 5. control_mode = fusion：精细停靠点，位置 + 速度融合控制，会停稳后执行 action；
# 6. control_mode = fusion_route：复杂通过点，位置 + 速度融合控制，但不强制长时间停稳；
# 7. 正式比赛前请按现场实测微调所有 x/y/z，尤其是圆环 x 和降落点映射。

mission:
  frame: relative_home

  # 起飞参数
  takeoff:
    z: 1.35
    yaw_deg: 0.0
    stable_time: 0.70

  # 正式比赛建议 true；如果只想单独调航线，可临时改 false。
  wait_real_qr: true
  wait_real_image: true

  # 降落点映射
  # 当前按之前讨论：left -> 下方 H 点 (0, 1.6)，right -> 上方 H 点 (0, -1.6)。
  # 若现场二维码 left/right 的判定相反，只需要交换下面 left/right 的 y。
  landing:
    default_side: left
    approach_x: 1.00
    left:
      x: 0.00
      y: 1.60
    right:
      x: 0.00
      y: -1.60

  # 通用控制参数
  control:
    rate_hz: 30.0

    yaw_eps_deg: 5.0
    yaw_break_eps_deg: 12.0

    # 普通 route 点用 position 控制，不需要特别小的到点误差。
    route_pos_eps: 0.22
    route_finish_vel: 0.20
    route_finish_acc: 0.60

    # scan/drop/ring 精细点用融合控制，要求更稳。
    scan_pos_eps: 0.08
    scan_kp: 0.75
    scan_stable_vel: 0.08
    scan_stable_acc: 0.25
    scan_stable_time: 0.70

  # 动作耗时参数
  action:
    qr_scan_timeout: 3.0
    image_scan_time: 1.2
    drop_time: 1.0
    hold_after_action: 0.25

  # 固定任务点
  waypoints:
    # 01 二维码扫描点：坐标系1中二维码为 (1.8, 0)
    - name: QR_SCAN
      kind: scan
      control_mode: fusion
      action: qr_scan
      x: 1.80
      y: 0.00
      z: 1.35
      yaw_deg: 0.0
      speed: 0.35
      acc: 0.35
      hold_time: 0.50

    # 02 顺时针绕障：障碍物中心 (4.3, 0)，半径约 0.9 m
    - name: OBS_ENTRY
      kind: route
      control_mode: position
      action: none
      x: 3.40
      y: 0.00
      z: 1.35
      yaw_deg: 0.0
      speed: 0.85
      acc: 0.60

    - name: OBS_DOWN
      kind: route
      control_mode: position
      action: none
      x: 4.30
      y: 0.90
      z: 1.35
      yaw_deg: 0.0
      speed: 0.75
      acc: 0.55

    - name: OBS_LEFT
      kind: route
      control_mode: position
      action: none
      x: 5.20
      y: 0.00
      z: 1.35
      yaw_deg: 0.0
      speed: 0.75
      acc: 0.55

    - name: OBS_UP
      kind: route
      control_mode: position
      action: none
      x: 4.30
      y: -0.90
      z: 1.35
      yaw_deg: 0.0
      speed: 0.75
      acc: 0.55

    - name: OBS_EXIT
      kind: route
      control_mode: position
      action: none
      x: 3.40
      y: 0.00
      z: 1.35
      yaw_deg: 0.0
      speed: 0.85
      acc: 0.60

    # 03 图片靶顺序：图片靶2 -> 图片靶1 -> 图片靶3 -> 图片靶4
    # 每个靶：先高处到正上方，再垂直下降投放判断，再原地爬升，避免低空横移。
    - name: IMG2_OVER
      kind: scan
      control_mode: fusion
      action: none
      x: 3.60
      y: -1.60
      z: 1.35
      yaw_deg: 0.0
      speed: 0.40
      acc: 0.35
      hold_time: 0.15

    - name: IMG2_DROP
      kind: scan
      control_mode: fusion
      action: image_scan_maybe_drop
      x: 3.60
      y: -1.60
      z: 0.75
      yaw_deg: 0.0
      speed: 0.28
      acc: 0.25
      hold_time: 0.35

    - name: IMG2_UP
      kind: scan
      control_mode: fusion
      action: none
      x: 3.60
      y: -1.60
      z: 1.35
      yaw_deg: 0.0
      speed: 0.35
      acc: 0.30
      hold_time: 0.10

    - name: IMG1_OVER
      kind: scan
      control_mode: fusion
      action: none
      x: 1.80
      y: -1.60
      z: 1.35
      yaw_deg: 0.0
      speed: 0.45
      acc: 0.35
      hold_time: 0.15

    - name: IMG1_DROP
      kind: scan
      control_mode: fusion
      action: image_scan_maybe_drop
      x: 1.80
      y: -1.60
      z: 0.75
      yaw_deg: 0.0
      speed: 0.28
      acc: 0.25
      hold_time: 0.35

    - name: IMG1_UP
      kind: scan
      control_mode: fusion
      action: none
      x: 1.80
      y: -1.60
      z: 1.35
      yaw_deg: 0.0
      speed: 0.35
      acc: 0.30
      hold_time: 0.10

    - name: IMG3_OVER
      kind: scan
      control_mode: fusion
      action: none
      x: 1.80
      y: 1.60
      z: 1.35
      yaw_deg: 0.0
      speed: 0.55
      acc: 0.40
      hold_time: 0.15

    - name: IMG3_DROP
      kind: scan
      control_mode: fusion
      action: image_scan_maybe_drop
      x: 1.80
      y: 1.60
      z: 0.75
      yaw_deg: 0.0
      speed: 0.28
      acc: 0.25
      hold_time: 0.35

    - name: IMG3_UP
      kind: scan
      control_mode: fusion
      action: none
      x: 1.80
      y: 1.60
      z: 1.35
      yaw_deg: 0.0
      speed: 0.35
      acc: 0.30
      hold_time: 0.10

    - name: IMG4_OVER
      kind: scan
      control_mode: fusion
      action: none
      x: 3.60
      y: 1.60
      z: 1.35
      yaw_deg: 0.0
      speed: 0.45
      acc: 0.35
      hold_time: 0.15

    - name: IMG4_DROP
      kind: scan
      control_mode: fusion
      action: image_scan_maybe_drop
      x: 3.60
      y: 1.60
      z: 0.75
      yaw_deg: 0.0
      speed: 0.28
      acc: 0.25
      hold_time: 0.35

    - name: IMG4_UP
      kind: scan
      control_mode: fusion
      action: none
      x: 3.60
      y: 1.60
      z: 1.35
      yaw_deg: 0.0
      speed: 0.35
      acc: 0.30
      hold_time: 0.10

    # 04 特殊靶：中心 (6.0, 1.0)
    - name: SPECIAL_OVER
      kind: scan
      control_mode: fusion
      action: none
      x: 6.00
      y: 1.00
      z: 1.35
      yaw_deg: 0.0
      speed: 0.45
      acc: 0.35
      hold_time: 0.25

    - name: SPECIAL_DROP
      kind: scan
      control_mode: fusion
      action: special_drop
      x: 6.00
      y: 1.00
      z: 0.75
      yaw_deg: 0.0
      speed: 0.25
      acc: 0.22
      hold_time: 0.35

    - name: SPECIAL_UP
      kind: scan
      control_mode: fusion
      action: none
      x: 6.00
      y: 1.00
      z: 1.35
      yaw_deg: 0.0
      speed: 0.35
      acc: 0.30
      hold_time: 0.10

    # 05 圆环：规则范围 x = 4.8 ~ 7.2, y = -1.6
    # 这里先使用默认中心 x = 6.0；后续接入视觉后可用识别结果替换这些点。
    - name: RING_SEARCH_START
      kind: route
      control_mode: fusion_route
      action: none
      x: 4.80
      y: -1.60
      z: 1.60
      yaw_deg: 0.0
      speed: 0.35
      acc: 0.30

    - name: RING_PRE
      kind: route
      control_mode: fusion_route
      action: none
      x: 5.20
      y: -1.60
      z: 1.60
      yaw_deg: 0.0
      speed: 0.30
      acc: 0.25

    - name: RING_CENTER
      kind: route
      control_mode: fusion_route
      action: none
      x: 6.00
      y: -1.60
      z: 1.60
      yaw_deg: 0.0
      speed: 0.28
      acc: 0.22

    - name: RING_POST
      kind: route
      control_mode: fusion_route
      action: none
      x: 6.80
      y: -1.60
      z: 1.60
      yaw_deg: 0.0
      speed: 0.30
      acc: 0.25

    # 06 回降落区：先走上侧安全通道，再在 x=1.0 处切到目标降落点 y，避免斜穿障碍物附近。
    - name: LAND_TOP_CORRIDOR
      kind: route
      control_mode: position
      action: none
      x: 6.80
      y: -2.20
      z: 1.35
      yaw_deg: 0.0
      speed: 0.85
      acc: 0.60

    - name: LAND_RIGHT_CORRIDOR
      kind: route
      control_mode: position
      action: none
      x: 1.00
      y: -2.20
      z: 1.35
      yaw_deg: 0.0
      speed: 0.95
      acc: 0.65

    - name: LAND_APPROACH_DYNAMIC
      kind: route
      control_mode: position
      action: none
      dynamic_land: true
      x: 1.00
      y: 0.00
      z: 1.35
      yaw_deg: 0.0
      speed: 0.75
      acc: 0.50

    - name: LAND_FINAL_DYNAMIC
      kind: scan
      control_mode: fusion
      action: mission_done
      dynamic_land: true
      x: 0.00
      y: 0.00
      z: 1.35
      yaw_deg: 0.0
      speed: 0.30
      acc: 0.25
      hold_time: 1.00
